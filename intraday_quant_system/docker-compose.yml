services:
  pipeline:
    build: .
    container_name: quant_pipeline
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_in_production}@redis:6379/0
      - TIMESCALEDB_URL=${TIMESCALEDB_URL:-postgresql://quant:${POSTGRES_PASSWORD:-changeme_in_production}@timescaledb:5432/intraday_db}
    ports:
      - "8000:8000" # Prometheus metrics
      - "8501:8501" # Streamlit Dashboard
    volumes:
      - ./data:/app/data
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  redis:
    image: redis:7.2-alpine
    container_name: quant_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    # No host port binding — internal only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: quant_timescaledb
    restart: always
    environment:
      - POSTGRES_DB=intraday_db
      - POSTGRES_USER=quant
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_in_production}
    # No host port binding — internal only
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d intraday_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: quant_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - pipeline
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: quant_grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  timescaledb_data:
  prometheus_data:
  grafana_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
